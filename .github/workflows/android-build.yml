name: Build Android APK (Zero Wait)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    name: Build APK Locally on GitHub Runner
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: ☕ Setup Java (Required for Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Android APK
        # The --local flag forces it to build using the GitHub server's CPU, entirely skipping the 1-hour Expo Queue!
        run: eas build --platform android --profile preview --local --non-interactive --output ./unimate-app.apk

      - name: 💾 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniMate-Android-APK
          path: ./unimate-app.apk
          retention-days: 7
